<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Instagram</title>
</head>

<body>
    <div class="instagram-wrapper">
        <div class="instagram-phone">
            <img src="./img/instgram4.png" alt="celular">
        </div>
        <div class="instagram-continue">
            <div class="group">
                <img src="./img/instalogo.png" class="instagram-logo" alt="instagram logo">
                <div class="profile-photo">
                    <img src="./img/perfil.png" alt="foto de perfil">
                </div>
                <a href="#" class="instagram-login">Continue como franciscofrank</a>
                <a href="#" class="instagram-logout"><strong>Remover conta</strong></a>
            </div>
            <div class="group">
                <p class="not-account"><strong>Não é franciscofrank?</strong></p>
                <p class="not-account">
                    <span class="link-blue"><strong>Alternar contas</strong></span>
                    ou
                    <span class="link-blue"><strong>Inscreva-se</strong></span>
                </p>
            </div>
            <div class="get-the-app">
                <p class="get-app"><strong>Baixe o aplicativo</strong></p>
                <div class="download">
                    <a href="#" class="app-download"></a>
                    <a href="#" class="app-download"></a>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
